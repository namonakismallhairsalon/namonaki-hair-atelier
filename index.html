<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>namonaki Hair Atelier</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #666;
      margin-bottom: 25px;
    }

    .gender-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    .gender-btn {
      padding: 12px 20px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-size: 16px;
    }

    .gender-btn:hover {
      background: #eee;
    }

    .start-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: black;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }

    .start-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>namonaki Hair Atelier</h1>
    <p>AI Hair Counseling Experience</p>

    <div class="gender-buttons">
      <button class="gender-btn">メンズ</button>
      <button class="gender-btn">レディース</button>
    </div>

    <button class="start-btn" onclick="goToCounseling()">
      AIカウンセリング開始
    </button>
  </div>

  <script>
    function goToCounseling() {
      window.location.href = "/counseling.html";
    }
  </script>
</body>
</html>
