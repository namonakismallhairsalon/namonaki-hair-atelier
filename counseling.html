<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki Hair Atelier</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg,#f4f1eb,#e9e3d9);
  color: #333;
  text-align: center;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  margin: 8px;
  cursor: pointer;
  font-weight: bold;
}

.primary {
  background: #c8b6a6;
  color: white;
}

.gray {
  background: #ddd;
}

input[type=file] {
  margin: 10px 0;
}

#result {
  display: none;
}

.loader {
  display: none;
  margin: 20px auto;
  border: 5px solid #eee;
  border-top: 5px solid #c8b6a6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.result-box {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>namonaki Hair Atelier</header>

<div class="container">

  <!-- INPUT -->
  <div class="card" id="inputBox">
    <p>AIカウンセリング</p>

    <input type="file" id="fileInput" accept="image/*"><br>

    <button onclick="setGender('men')" class="gray">メンズ</button>
    <button onclick="setGender('women')" class="gray">レディース</button>

    <br>

    <button class="primary" onclick="startAI()">AIで似合う髪型を見る</button>
  </div>

  <!-- LOADING -->
  <div class="loader" id="loader"></div>
  <p id="loadingText"></p>

  <!-- RESULT -->
  <div id="result" class="result-box">
    <h2>診断結果</h2>

    <p id="hairType"></p>

    <img id="preview">

    <br><br>

    <button class="primary" onclick="saveLINE()">LINEで保存</button>
    <button class="primary" onclick="saveStory()">ストーリー保存</button>
    <button class="gray" onclick="location.reload()">戻る</button>
  </div>

</div>

<script>

let gender = "men";
let selectedImage = "";

function setGender(g) {
  gender = g;
}

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    selectedImage = event.target.result;
  }
