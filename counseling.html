<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki AI Counseling</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    linear-gradient(
      135deg,
      #f4f1eb,
      #e9e3d9
    );
  font-family:
    "Helvetica Neue",
    sans-serif;
  padding: 20px;
}

.container {
  max-width: 450px;
  margin: auto;
  background:
    rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-radius: 34px;
  padding: 30px;
  box-shadow:
    0 10px 40px
    rgba(0,0,0,0.08);
  border:
    1px solid
    rgba(255,255,255,0.5);
}

.logo {
  text-align: center;
  font-size: 12px;
  letter-spacing: 5px;
  color: #8a7f74;
  margin-bottom: 12px;
}

h1 {
  text-align: center;
  margin-bottom: 8px;
  font-size: 34px;
  font-weight: 300;
  letter-spacing: 2px;
}

.sub {
  text-align: center;
  color: #666;
  margin-bottom: 25px;
}

.upload-box {
  border: 2px dashed #ccc;
  border-radius: 18px;
  padding: 20px;
  text-align: center;
  background: #fafafa;
}

input[type="file"] {
  margin-top: 10px;
}

#preview {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
  display: none;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}

.diagnose-btn {
  margin-top: 20px;
  background: black;
  color: white;
}

.back-btn {
  margin-top: 15px;
  background: #e6e6e6;
}

.loader {
  width: 60px;
  height: 60px;
  border: 5px solid #ddd;
  border-top: 5px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.result-card {
  margin-top: 20px;
  background: #fafafa;
  border-radius: 20px;
  padding: 20px;
}

.result-card li {
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
NAMONAKI HAIR ATELIER
</div>

<h1>AIカウンセリング</h1>

<p class="sub">
あなたに似合う髪型を診断します
</p>

<div class="upload-box">
<h3>顔写真をアップロード</h3>

<input
type="file"
accept="image/*"
onchange="previewImage(event)"
>
</div>

<img id="preview">

<button
class="diagnose-btn"
onclick="analyze()"
>
AIで似合う髪型を見る
</button>

<div id="result"></div>

<button
class="back-btn"
onclick="history.back()"
>
戻る
</button>

</div>

<script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview =
    document.getElementById("preview");

  if (file) {
    preview.src =
      URL.createObjectURL(file);

    preview.style.display = "block";
  }
}

function analyze() {
  const result =
    document.getElementById("result");

  result.innerHTML = `
    <div style="text-align:center;">
      <div class="loader"></div>
      <h3>AI分析中...</h3>
      <p>
        顔型・骨格・雰囲気を診断しています
      </p>
    </div>
  `;

  setTimeout(() => {

    const faceTypes = [
      "丸顔タイプ",
      "面長タイプ",
      "ベース顔タイプ",
      "卵型タイプ"
    ];

    const styles = [
      "ナチュラルマッシュ",
      "センターパート",
      "ツーブロック",
      "ゆるパーマ",
      "アップバング"
    ];

    const face =
      faceTypes[
        Math.floor(
          Math.random()
          * faceTypes.length
        )
      ];

    const picks =
      [...styles]
      .sort(() => Math.random() - 0.5)
      .slice(0, 3);

    result.innerHTML = `
      <div class="result-card">

      <h2>
        ✨ AI診断結果
      </h2>

      <p>
      <b>顔タイプ:</b>
      ${face}
      </p>

      <p>
      <b>おすすめスタイル</b>
      </p>

      <ul>
        ${picks.map(style =>
          `<li>✂ ${style}</li>`
        ).join("")}
      </ul>

      </div>
    `;

  }, 2500);
}
</script>

</body>
</html>
