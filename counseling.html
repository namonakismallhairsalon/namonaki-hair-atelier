<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki Hair Atelier</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg,#f4f1eb,#e9e3d9);
  color: #333;
  text-align: center;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  margin: 8px;
  cursor: pointer;
  font-weight: bold;
  position: relative;
  z-index: 2;
}

.primary {
  background: #c8b6a6;
  color: white;
}

.gray {
  background: #ddd;
}

.selected {
  background: #c8b6a6;
  color: white;
}

input[type=file] {
  margin: 10px 0;
  width: 100%;
}

#result {
  display: none;
}

.loader {
  display: none;
  margin: 20px auto;
  border: 5px solid #eee;
  border-top: 5px solid #c8b6a6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.result-box {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

.fade-in {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#resultTop {
  scroll-margin-top: 20px;
}
img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.style-card {
  background: #f7f5f1;
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
  text-align: left;
  cursor: pointer;
  position: relative;
  z-index: 5;
}

.style-card:active {
  transform: scale(0.98);
}

.style-card.selected-style {
  background: #c8b6a6;
  color: white;
  transform: scale(1.02);
  box-shadow: 0 0 18px rgba(200,182,166,0.6);
  transition: all 0.25s ease;
}

.hidden {
  opacity: 0;
  transform: translateY(15px);
}

.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s ease;
}


.scanner-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.06),
    transparent
  );

  animation:
  shineMove 3s linear infinite;
}

@keyframes shineMove{
  0%{
    transform:
    translateX(-120%);
  }

  100%{
    transform:
    translateX(120%);
  }
}

.ai-face::before{
  content:"";
  position:absolute;
  inset:10px;
  border:2px solid
  rgba(200,182,166,0.5);
  border-radius:50%;
  animation:
  pulseRing 2s ease infinite;
}

@keyframes pulseRing{
  0%{
    transform:scale(0.95);
    opacity:0.5;
  }

  50%{
    transform:scale(1.02);
    opacity:1;
  }

  100%{
    transform:scale(0.95);
    opacity:0.5;
  }
}

#loadingText{
  min-height:28px;
  font-size:15px;
  opacity:0;
  animation:
  textFade .5s forwards;
}

@keyframes textFade{
  to{
    opacity:1;
  }
}
.loading-screen{
  display:none;
  padding:30px 20px;
}

.scanner-box{
  background:#111;
  border-radius:24px;
  padding:30px 20px;
  color:white;
  position:relative;
  overflow:hidden;
  box-shadow:
  0 0 30px rgba(0,0,0,0.25);
}

.ai-face{
  width:180px;
  height:180px;
  margin:20px auto;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
  background:
  radial-gradient(circle,
  rgba(255,255,255,0.08),
  rgba(255,255,255,0.02));
}

.face-grid{
  position:absolute;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
  linear-gradient(90deg,
  rgba(255,255,255,0.08) 1px,
  transparent 1px);
  background-size:18px 18px;
}

.scan-line{
  position:absolute;
  left:0;
  width:100%;
  height:3px;
  background:
  linear-gradient(to right,
  transparent,
  #c8b6a6,
  transparent);

  box-shadow:
  0 0 20px rgba(200,182,166,0.8);

  animation:
  scanMove 2s linear infinite;
}

@keyframes scanMove{
  0%{
    top:15%;
  }

  100%{
    top:85%;
  }
}

.scanner-box h2{
  letter-spacing:3px;
  font-size:20px;
  margin-top:10px;
}

.progress-bar{
  width:100%;
  height:10px;
  background:rgba(255,255,255,0.12);
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

#progressFill{
  width:0%;
  height:100%;
  background:#c8b6a6;
  transition:0.2s;
}

#percentText{
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
}

.face-detect-box{
  position:absolute;
  width:90px;
  height:110px;
  border:2px solid
  rgba(200,182,166,0.95);

  border-radius:16px;
  top:35px;
  left:45px;

  box-shadow:
  0 0 20px
  rgba(200,182,166,0.45);

  animation:
  detectMove 2s ease-in-out infinite;
}

.face-detect-box::before,
.face-detect-box::after{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  border-color:#fff;
}

.face-detect-box::before{
  top:-3px;
  left:-3px;
  border-top:2px solid;
  border-left:2px solid;
}

.face-detect-box::after{
  bottom:-3px;
  right:-3px;
  border-bottom:2px solid;
  border-right:2px solid;
}

@keyframes detectMove{

  0%{
    transform:
    translateY(-3px);
  }

  50%{
    transform:
    translateY(3px);
  }

  100%{
    transform:
    translateY(-3px);
  }
}

.result-card{
  background:
  rgba(255,255,255,0.72);

  backdrop-filter:
  blur(10px);

  -webkit-backdrop-filter:
  blur(10px);

  border:
  1px solid
  rgba(255,255,255,0.45);

  border-radius:20px;

  padding:16px;
  margin-top:14px;

  text-align:left;

  box-shadow:
  0 8px 24px
  rgba(0,0,0,0.08);

  opacity:0;
  transform:
  translateY(25px)
  scale(.98);
}

.result-card.show-card{
  opacity:1;
  transform:
  translateY(0)
  scale(1);

  transition:
  all .65s ease;
}

.result-title{
  font-size:12px;
  letter-spacing:1px;
  opacity:.55;
  margin-bottom:6px;
}

.result-main{
  font-size:16px;
  line-height:1.7;
}

.result-card{
  transition:
  transform .25s ease,
  box-shadow .25s ease;
}

.result-card:active{
  transform:
  scale(.98);
}

.result-card:hover{
  transform:
  translateY(-3px);

  box-shadow:
  0 14px 30px
  rgba(0,0,0,.12);
}

#scoreArea{
  margin-top:20px;
}

.score-card{
  background:#fff;
  padding:14px;
  border-radius:18px;
  margin-top:12px;
  text-align:left;
  box-shadow:
  0 8px 20px
  rgba(0,0,0,.06);
}

.score-label{
  font-size:14px;
  margin-bottom:8px;
}

.score-bar{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
}

.score-fill{
  width:0%;
  height:100%;
  background:#c8b6a6;
  transition:1s ease;
}

.score-card span{
  display:block;
  margin-top:8px;
  font-weight:bold;
}

#previewWrap{
  position: relative;
  width: 100%;
}

#preview{
  width:100%;
  display:block;
  border-radius:12px;
}

#hairOverlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
  opacity:.9;
  display:none;
}

</style>
</head>

<body>

<header>namonaki Hair Atelier</header>

<div class="container">

  <!-- INPUT -->
  <div class="card" id="inputBox">
    <p>AIカウンセリング</p>

    <input type="file" id="fileInput" accept="image/*"><br>

    <button
  id="menBtn"
  onclick="setGender('men')"
  class="gray">

  メンズ
</button>

<button
  id="womenBtn"
  onclick="setGender('women')"
  class="gray">

  レディース
</button>

    <br>

    <button class="primary" onclick="startAI()">AIで似合う髪型を見る</button>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading-screen">

  <div class="scanner-box">

    <div class="scan-line"></div>

    <div class="ai-face">

<div class="face-detect-box"></div>

  <img
    id="scanPreview"
    style="
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
    "
  >

  <div class="face-grid"></div>

</div>

    <h2>AI ANALYZING</h2>

    <p id="loadingText">
      Face Balance Scan...
    </p>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>

    <div id="percentText">
      0%
    </div>

  </div>

</div>

  <!-- RESULT -->
<div id="result" class="result-box">
  <h2 id="resultTop">AI診断結果</h2>

  <div
  id="faceType"
  class="result-card">

  <div class="result-title">
    FACE TYPE
  </div>

  <div class="result-main"></div>
</div>

<div
  id="vibe"
  class="result-card">

  <div class="result-title">
    VIBE
  </div>

  <div class="result-main"></div>
</div>

<div
  id="hairType"
  class="result-card">

  <div class="result-title">
    HAIR STYLE
  </div>

  <div class="result-main"></div>
</div>

<div
  id="counselingText"
  class="result-card">

<div id="scoreArea">

  <div class="score-card">
    <div class="score-label">
      似合わせ度
    </div>

    <div class="score-bar">
      <div
        id="matchScore"
        class="score-fill">
      </div>
    </div>

    <span id="matchPercent">
      0%
    </span>
  </div>

  <div class="score-card">
    <div class="score-label">
      清潔感
    </div>

    <div class="score-bar">
      <div
        id="cleanScore"
        class="score-fill">
      </div>
    </div>

    <span id="cleanPercent">
      0%
    </span>
  </div>

  <div class="score-card">
    <div class="score-label">
      垢抜け期待値
    </div>

    <div class="score-bar">
      <div
        id="styleScore"
        class="score-fill">
      </div>
    </div>

    <span id="stylePercent">
      0%
    </span>
  </div>

</div>

  <div class="result-title">
    AI COUNSELING
  </div>

  <div class="result-main"></div>
</div>

<p id="hairPreviewTitle"></p>
  <div id="previewWrap">
  <img id="preview">
  <img id="hairOverlay">
</div>

<div id="styleSuggestions"></div>

  <br><br>

  <button class="primary" onclick="generateHair()">
    似合う髪型を合成
  </button>

  <br><br>

  <button class="primary" onclick="saveLINE()">
    LINEで保存
  </button>

  <button class="primary" onclick="saveStory()">
    ストーリー保存
  </button>

  <button class="gray" onclick="location.reload()">
    戻る
  </button>
</div>

</div>

<script>

let gender = "men";
let selectedImage = "";

let matchTarget = 0;
let cleanTarget = 0;
let styleTarget = 0;

function setGender(g) {

  gender = g;

  document.getElementById(
    "menBtn"
  ).classList.remove(
    "selected"
  );

  document.getElementById(
    "womenBtn"
  ).classList.remove(
    "selected"
  );

  if (g === "men") {

    document.getElementById(
      "menBtn"
    ).classList.add(
      "selected"
    );

  } else {

    document.getElementById(
      "womenBtn"
    ).classList.add(
      "selected"
    );
  }
}

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    selectedImage = event.target.result;
  }

  reader.readAsDataURL(file);
});

function startAI() {

  if (!selectedImage) {
    alert("顔写真を選択してください");
    return;
  }

  document.getElementById(
    "inputBox"
  ).style.display = "none";

  document.getElementById(
    "loadingScreen"
  ).style.display = "block";

document.getElementById(
  "scanPreview"
).src = selectedImage;

  const loadingText =
    document.getElementById(
      "loadingText"
    );

  const progressFill =
    document.getElementById(
      "progressFill"
    );

  const percentText =
    document.getElementById(
      "percentText"
    );

  let percent = 0;

  const scanMessages = [
    "Face Balance Scan...",
    "Bone Structure Scan...",
    "Hair Compatibility...",
    "AI Styling Analyze..."
  ];

  let msgIndex = 0;

  const textLoop = setInterval(() => {

    msgIndex++;

    if (
      msgIndex >=
      scanMessages.length
    ) {
      msgIndex = 0;
    }

    loadingText.innerText =
      scanMessages[msgIndex];

  }, 700);

  const progressLoop =
    setInterval(() => {

    percent += 2;

    progressFill.style.width =
      percent + "%";

    percentText.innerText =
      percent + "%";

    if (percent >= 100) {

      clearInterval(
        progressLoop
      );

      clearInterval(
        textLoop
      );

      loadingText.innerText =
        "診断完了";

      setTimeout(() => {

        document.getElementById(
          "loadingScreen"
        ).style.display =
          "none";

        showResult();

      }, 700);
    }

  }, 50);
}

function showResult() {

document.getElementById(
  "result"
).classList.remove(
  "fade-in"
);
  document.getElementById("result").style.display = "block";

document.getElementById(
  "result"
).classList.add(
  "fade-in"
);

  let hairType = "";
  let faceType = "";
  let vibe = "";
let counselingText = "";

  if (gender === "men") {

    faceType = "顔型：面長寄り";
    vibe = "雰囲気：ナチュラル × 清潔感";

    hairType =
    "おすすめ：ナチュラルショート / センターパート / ゆるパーマ";
counselingText =
"顔まわりのバランスを見ると、横に少し厚みを出すスタイルが似合いやすいです。トップを上げすぎない方が自然にまとまりやすく、清潔感のある印象になります。";

  } else {

    faceType = "顔型：卵型寄り";
    vibe = "雰囲気：柔らかい印象";

    hairType =
    "おすすめ：レイヤースタイル / シースルーバング";
counselingText =
"顔まわりに柔らかさを出すレイヤー系が相性◎。前髪に軽さを出すことで小顔バランスが作りやすくなります。";
  }

  document.querySelector(
  "#faceType .result-main"
).innerText =
faceType;

document.querySelector(
  "#vibe .result-main"
).innerText =
vibe;

document.querySelector(
  "#hairType .result-main"
).innerText =
hairType;

document.querySelector(
  "#counselingText .result-main"
).innerText =
counselingText;

const items = [
  "faceType",
  "vibe",
  "hairType",
  "counselingText"
];

items.forEach((id) => {
  document.getElementById(id)
    .classList.remove("show");
});

setTimeout(() => {
  document.getElementById(
    "faceType"
  ).classList.add("show-card");
}, 200);

setTimeout(() => {
  document.getElementById(
    "vibe"
  ).classList.add("show-card");
}, 500);

setTimeout(() => {
  document.getElementById(
    "hairType"
  ).classList.add("show-card");
}, 800);

setTimeout(() => {
  document.getElementById(
    "counselingText"
  ).classList.add("show-card");
}, 1100);

setTimeout(() => {

  let base = 0;

if (gender === "men") {
  base = 85;
} else {
  base = 88;
}

// 顔タイプで変化させる（AIっぽい部分）
if (faceType.includes("面長")) {
  matchTarget = base + 5;
  cleanTarget = base + 2;
  styleTarget = base + 7;
} 
else if (faceType.includes("卵型")) {
  matchTarget = base + 8;
  cleanTarget = base + 6;
  styleTarget = base + 9;
}
else {
  matchTarget = base + 3;
  cleanTarget = base + 3;
  styleTarget = base + 4;
}

  if (gender === "women") {
    matchTarget = 94;
    cleanTarget = 91;
    styleTarget = 96;
  }

  let match = 0;
  let clean = 0;
  let style = 0;

  const interval = setInterval(() => {

    if (match < matchTarget) match++;
    if (clean < cleanTarget) clean++;
    if (style < styleTarget) style++;

    document.getElementById("matchScore").style.width = match + "%";
    document.getElementById("cleanScore").style.width = clean + "%";
    document.getElementById("styleScore").style.width = style + "%";

    document.getElementById("matchPercent").innerText = match + "%";
    document.getElementById("cleanPercent").innerText = clean + "%";
    document.getElementById("stylePercent").innerText = style + "%";

    if (
      match >= matchTarget &&
      clean >= cleanTarget &&
      style >= styleTarget
    ) {
      clearInterval(interval);
    }

  }, 20);

}, 1500);

  if (selectedImage) {
    document.getElementById("preview").src =
      selectedImage;
  }

if (gender === "men") {

 document.getElementById(
  "styleSuggestions"
).innerHTML = `
  <div class="style-card"
  onclick="changeStyle('ナチュラルマッシュ', event)">
  ✂ ナチュラルマッシュ
</div>

<div class="style-card"
  onclick="changeStyle('センターパート', event)">
  ✂ センターパート
</div>

<div class="style-card"
  onclick="changeStyle('ゆるパーマ', event)">
  ✂ ゆるパーマ
</div>
  </div>
`;

} else {

  document.getElementById(
  "styleSuggestions"
).innerHTML = `
  <div class="style-card"
  onclick="changeStyle('韓国風レイヤー', event)">
  ✂ 韓国風レイヤー
</div>

<div class="style-card"
  onclick="changeStyle('シースルーボブ', event)">
  ✂ シースルーボブ
</div>

<div class="style-card"
  onclick="changeStyle('柔らかミディ', event)">
  ✂ 柔らかミディ
</div>
`;
}

}

/* ===== 保存機能 ===== */

// LINE保存（簡易：画像＋テキストをまとめてダウンロード）
function saveLINE() {
  const text = document.getElementById("hairType").innerText;
  downloadText("LINE_share.txt", "【namonaki診断】\n" + text);
}

// ストーリー保存（縦長用テキスト）
function saveStory() {
  const text = document.getElementById("hairType").innerText;
  downloadText("story_share.txt",
`🌿 namonaki Hair Atelier
AI診断結果

${text}

#hair #style #namonaki`);
}

// ダウンロード処理
function downloadText(filename, text) {
  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

function generateHair() {

  document.getElementById(
    "loadingScreen"
  ).style.display =
    "block";

  document.getElementById(
    "scanPreview"
  ).src =
    selectedImage;

  document.getElementById(
    "loadingText"
  ).innerText =
    "AI Hair Styling...";

  document.getElementById(
    "progressFill"
  ).style.width =
    "0%";

  document.getElementById(
    "percentText"
  ).innerText =
    "0%";

document.getElementById("hairOverlay").style.display = "block";

if (gender === "men") {
  document.getElementById("hairOverlay").src =
    "https://drive.google.com/uc?export=view&id=1guEBqevG_k9zVoeYO7qeRz6nAibXOlFh";
} else {
  document.getElementById("hairOverlay").src =
    "https://i.imgur.com/YYYYYYY.png";
}

document.getElementById("hairOverlay").style.display = "block";

  let percent = 0;

  const interval =
  setInterval(() => {

    percent += 4;

    document.getElementById(
      "progressFill"
    ).style.width =
      percent + "%";

    document.getElementById(
      "percentText"
    ).innerText =
      percent + "%";

    if (percent >= 100) {

      clearInterval(
        interval
      );

      document.getElementById(
        "loadingText"
      ).innerText =
        "スタイル合成完了";

      setTimeout(() => {

  document.getElementById("loadingScreen").style.display = "none";

  document.getElementById("hairPreviewTitle").innerText =
    "✨ AIおすすめスタイルを適用";

  let reactionText = "";

  if (styleTarget > 95) {
    reactionText = "✨非常にバランスが良い印象です";
  } else if (styleTarget > 90) {
    reactionText = "👍とても似合いやすいスタイルです";
  } else {
    reactionText = "💡少し調整でさらに良くなります";
  }

  document.querySelector("#counselingText .result-main").innerText =
    reactionText;

  document.getElementById("preview").scrollIntoView({
    behavior: "smooth"
  });

}, 700);
    }

  }, 50);
}

window.changeStyle =  function(styleName, event){

document.querySelectorAll(".style-card")
.forEach(card => {
  card.classList.remove("selected-style");
