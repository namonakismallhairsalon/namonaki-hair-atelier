

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki AI Counseling</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: linear-gradient(135deg,#f4f1eb,#e9e3d9);
  font-family: "Helvetica Neue", sans-serif;
  padding: 20px;
}

.container {
  max-width: 450px;
  margin: auto;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-radius: 34px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

.logo {
  text-align: center;
  font-size: 12px;
  letter-spacing: 5px;
  color: #8a7f74;
  margin-bottom: 12px;
}

h1 {
  text-align: center;
  font-size: 24px;
  font-weight: 300;
}

.sub {
  text-align: center;
  color: #8c8379;
  margin-bottom: 20px;
}

.upload-box {
  border: 1px solid #d8d2ca;
  border-radius: 28px;
  padding: 28px;
  text-align: center;
  background: linear-gradient(to bottom,#faf8f5,#f1ece5);
}

.file-btn {
  background: linear-gradient(135deg,#1f1f1f,#444);
  color: white;
  padding: 12px 20px;
  border-radius: 14px;
  display: inline-block;
  cursor: pointer;
}

#preview {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
  display: none;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}

.diagnose-btn {
  margin-top: 20px;
  background: linear-gradient(135deg,#1f1f1f,#444);
  color: white;
  font-weight: bold;
}

.back-btn {
  margin-top: 15px;
  background: #e6e6e6;
}

.loader {
  width: 60px;
  height: 60px;
  border: 5px solid #ddd;
  border-top: 5px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result-card {
  margin-top: 20px;
  background: linear-gradient(to bottom,#fff,#f7f4ef);
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.style-grid {
  display: grid;
  gap: 14px;
}

.style-card img {
  width: 100%;
  border-radius: 18px;
}

.style-card p {
  text-align: center;
  margin-top: 8px;
}

.save-btn {
  background: black;
  color: white;
  border-radius: 16px;
  padding: 14px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">NAMONAKI HAIR ATELIER</div>
<h1>AIカウンセリング</h1>
<p class="sub">あなたに似合う髪型を診断します</p>

<div class="upload-box">
  <label class="file-btn">
    ファイルを選択
    <input type="file" accept="image/*" onchange="previewImage(event)" hidden>
  </label>
</div>

<img id="preview">

<button class="diagnose-btn" onclick="analyze()">
AIで似合う髪型を見る
</button>

<div id="result"></div>

<button class="back-btn" onclick="history.back()">戻る</button>

</div>

<!-- html2canvas -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function analyze() {
  const result = document.getElementById("result");

  result.innerHTML = `
    <div style="text-align:center;">
      <div class="loader"></div>
      <h3>AI分析中...</h3>
    </div>
  `;

  setTimeout(() => {

    const score = Math.floor(Math.random()*10)+90;

    result.innerHTML = `
      <div class="result-card" id="captureArea">

        <h2>✨ AI診断結果</h2>

        <div style="text-align:center;">
          <div>AI SCORE</div>
          <div style="font-size:40px;font-weight:bold;">${score}%</div>
        </div>

        <p>おすすめスタイル</p>

        <div class="style-grid">
          <div class="style-card">
            <img src="https://images.unsplash.com/photo-1517832606299-7ae9b720a186?w=500">
            <p>ナチュラルマッシュ</p>
          </div>
        </div>

        <div style="background:black;color:white;padding:18px;border-radius:18px;margin-top:20px;">
          NAMONAKI美容師コメント<br><br>
          あなたにとても似合うバランスです。
          
          <button class="save-btn" onclick="saveResult()">
            診断結果を保存
          </button>
        </div>

      </div>
    `;

  }, 2000);
}

function saveResult() {
  const target = document.querySelector(".result-card");

  html2canvas(target, {
    useCORS: true,
    allowTaint: false
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "namonaki-result.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
