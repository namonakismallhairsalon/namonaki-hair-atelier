<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>
<script>
function analyze() {
  console.log("clicked"); // ← 動作確認用

  const styles = [
    "ナチュラルマッシュがおすすめです",
    "センターパートが似合います",
    "ツーブロックで清潔感アップ",
    "ゆるめパーマが相性良いです"
  ];

  const random = styles[Math.floor(Math.random() * styles.length)];

  document.getElementById("result").innerText =
    "診断結果: " + random;
}
</script>
