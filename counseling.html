<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>
  <input type="file" accept="image/*">

  <br><br>

  <button onclick="analyze()">診断する</button>

  <p id="result"></p>

  <br>
  <button onclick="history.back()">戻る</button>

  <script>
function analyze() {
  const result = document.getElementById("result");

  result.innerText = "分析中...";

  setTimeout(() => {
    const styles = [
      "ナチュラルマッシュがおすすめです",
      "センターパートが似合います",
      "ツーブロックで清潔感アップ",
      "ゆるめパーマが相性良いです"
    ];

    const random = styles[Math.floor(Math.random() * styles.length)];

    result.innerText = "診断結果: " + random;
  }, 1500);
}
</script>

</body>
</html>
