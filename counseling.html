<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki AI Counseling</title>

<style>
* {
  box-sizing: border-box;
}

.upload-box h3 {
  font-size: 16px;
  white-space: nowrap;
}

body {
  margin: 0;
  background:
    linear-gradient(135deg,#f4f1eb,#e9e3d9);
  font-family:
    "Helvetica Neue",
    sans-serif;
  padding: 20px;
}

.container {
  max-width: 450px;
  margin: auto;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-radius: 34px;
  padding: 30px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.08);
  border:
    1px solid rgba(255,255,255,0.5);
}

.logo {
  text-align: center;
  font-size: 12px;
  letter-spacing: 5px;
  color: #8a7f74;
  margin-bottom: 12px;
}

h1 {
  text-align: center;
  margin-bottom: 10px;
  font-size: 24px;
  font-weight: 300;
  letter-spacing: 4px;
}

.sub {
  text-align: center;
  color: #8c8379;
  margin-bottom: 30px;
  font-size: 15px;
  line-height: 1.7;
}

.upload-box {
  border: 1px solid #d8d2ca;
  border-radius: 28px;
  padding: 28px;
  text-align: center;
  background:
    linear-gradient(
      to bottom,
      #faf8f5,
      #f1ece5
    );
}

.file-btn {
  display: inline-block;
  background:
    linear-gradient(
      135deg,
      #1f1f1f,
      #444
    );
  color: white;
  padding: 12px 20px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 14px;
  margin-top: 10px;
}

.file-status {
  display: block;
  margin-top: 10px;
  font-size: 12px;
  color: #777;
}

#preview {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
  display: none;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}

.diagnose-btn {
  margin-top: 20px;
  background:
    linear-gradient(
      135deg,
      #1f1f1f,
      #444
    );
  color: white;
  font-weight: bold;
}

.back-btn {
  margin-top: 15px;
  background: #e6e6e6;
}

.loader {
  width: 60px;
  height: 60px;
  border: 5px solid #ddd;
  border-top: 5px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.result-card {
  margin-top: 25px;
  background:
    linear-gradient(
      to bottom,
      #ffffff,
      #f7f4ef
    );
  border-radius: 28px;
  padding: 24px;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.06);
}

.result-card li {
  margin-bottom: 8px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
NAMONAKI HAIR ATELIER
</div>

<h1>AIカウンセリング</h1>

<p class="sub">
あなたに似合う髪型を診断します
</p>

<div class="upload-box">
<h3>顔写真をアップロード</h3>

<label class="file-btn">
  ファイルを選択
  <input
    type="file"
    accept="image/*"
    onchange="previewImage(event)"
    hidden
  >
</label>

<span
id="fileName"
class="file-status"
>
写真を選択してください
</span>

</div>

<img id="preview">

<button
class="diagnose-btn"
onclick="analyze()"
>
AIで似合う髪型を見る
</button>

<div id="result"></div>

<button
class="back-btn"
onclick="history.back()"
>
戻る
</button>

</div>

<script>
function previewImage(event) {
  const file =
    event.target.files[0];

  const preview =
    document.getElementById(
      "preview"
    );

  const fileName =
    document.getElementById(
      "fileName"
    );

  if (file) {
    preview.src =
      URL.createObjectURL(file);

    preview.style.display =
      "block";

    fileName.textContent =
      file.name;
  }
}

function analyze() {
  const result =
    document.getElementById(
      "result"
    );

      </p>
    </div>

      "センターパート",
      "ツーブロック",
      "ゆるパーマ",
      "アップバング"
    ];

  "柔らかい雰囲気",
  "大人っぽい印象",
  "ナチュラルな魅力",
  "爽やかで清潔感がある"
];

const advice = [
  "トップに少し動きを出すと似合わせやすいです。",
  "顔周りに軽さを作るとバランスが良く見えます。",
  "束感を出すことで立体感がアップします。",
  "重さを残しつつ毛流れを作ると相性◎"
];

    const face =
      faceTypes[
        Math.floor(
          Math.random()
          * faceTypes.length
        )
      ];

    const picks =
      [...styles]
      .sort(() =>
        Math.random() - 0.5
      )
      .slice(0, 3);

    result.innerHTML = `
      <div class="result-card">

      <h2>
        ✨ AI診断結果
      </h2>

      <p>
      <b>顔タイプ:</b>
      ${face}
      </p>

      <p>
      <
