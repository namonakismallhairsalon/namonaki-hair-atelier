<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>
  <input type="file" accept="image/*" onchange="previewImage(event)">

<img id="preview" style="max-width:200px; display:none; margin-top:10px;">

  <br><br>

  <button onclick="async function analyze() {
  const result = document.getElementById("result");

  result.innerHTML = "AIが分析中...";

  const faceTypes = ["丸顔", "面長", "ベース顔", "卵型"];
  const face = faceTypes[Math.floor(Math.random() * faceTypes.length)];

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ face }),
  });

  const data = await res.json();

  result.innerHTML = `
    <h3>AI診断結果</h3>
    <p>${data.result}</p>
  `;
}">診断する</button>

  <div id="result" style="margin-top:20px;"></div>

  <br>
  <button onclick="history.back()">戻る</button>

  <script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function analyze() {
  const result = document.getElementById("result");

  result.innerHTML = `
    <div style="text-align:center; padding:20px;">
      <div style="
        width:40px;
        height:40px;
        border:4px solid #ddd;
        border-top:4px solid #333;
        border-radius:50%;
        margin:0 auto 10px;
        animation: spin 1s linear infinite;
      "></div>
      <p>AIがあなたの顔を分析中...</p>
    </div>
  `;

  setTimeout(() => {
    const faceTypes = [
      "丸顔タイプ",
      "面長タイプ",
      "ベース顔タイプ",
      "卵型タイプ"
    ];

    const styles = [
      { name: "ナチュラルマッシュ", desc: "柔らかく万人受けする王道スタイル" },
      { name: "センターパート", desc: "大人っぽく清潔感が出る人気ヘア" },
      { name: "ツーブロック", desc: "爽やかで男らしい印象を強調" },
      { name: "ゆるパーマ", desc: "抜け感とおしゃれ感を両立" }
    ];

    const face = faceTypes[Math.floor(Math.random() * faceTypes.length)];
    const shuffled = styles.sort(() => 0.5 - Math.random());
    const picks = shuffled.slice(0, 3);

    result.innerHTML = `
      <div style="margin-bottom:15px;">
        <h3>顔タイプ診断</h3>
        <p style="font-size:18px;"><b>${face}</b></p>
      </div>

      <div>
        <h3>おすすめヘアスタイル</h3>

        ${picks.map(style => `
          <div style="
            border:1px solid #ddd;
            padding:15px;
            border-radius:12px;
            margin-top:10px;
          ">
            <h4>${style.name}</h4>
            <p>${style.desc}</p>
          </div>
        `).join("")}
      </div>
    `;
  }, 1500);
}
</script>

</body>
</html>
