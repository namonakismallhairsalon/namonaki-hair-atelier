<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki Hair Atelier</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg,#f4f1eb,#e9e3d9);
  color: #333;
  text-align: center;
}

header {
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  margin: 8px;
  cursor: pointer;
  font-weight: bold;
  position: relative;
  z-index: 2;
}

.primary {
  background: #c8b6a6;
  color: white;
}

.gray {
  background: #ddd;
}

.selected {
  background: #c8b6a6;
  color: white;
}

input[type=file] {
  margin: 10px 0;
  width: 100%;
}

#result {
  display: none;
}

.loader {
  display: none;
  margin: 20px auto;
  border: 5px solid #eee;
  border-top: 5px solid #c8b6a6;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.result-box {
  background: #fff;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

.fade-in {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#resultTop {
  scroll-margin-top: 20px;
}
img {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

.style-card {
  background: #f7f5f1;
  padding: 12px;
  border-radius: 12px;
  margin-top: 12px;
  text-align: left;
  cursor: pointer;
  position: relative;
  z-index: 5;
}

.style-card:active {
  transform: scale(0.98);
}

.style-card.selected-style {
  background: #c8b6a6;
  color: white;
  transform: scale(1.02);
  box-shadow: 0 0 18px rgba(200,182,166,0.6);
  transition: all 0.25s ease;
}

.hidden {
  opacity: 0;
  transform: translateY(15px);
}

.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s ease;
}

.loading-screen{
  display:none;
  padding:30px 20px;
}

.scanner-box{
  background:#111;
  border-radius:24px;
  padding:30px 20px;
  color:white;
  position:relative;
  overflow:hidden;
  box-shadow:
  0 0 30px rgba(0,0,0,0.25);
}

.ai-face{
  width:180px;
  height:180px;
  margin:20px auto;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.2);
  background:
  radial-gradient(circle,
  rgba(255,255,255,0.08),
  rgba(255,255,255,0.02));
}

.face-grid{
  position:absolute;
  inset:0;
  background-image:
  linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
  linear-gradient(90deg,
  rgba(255,255,255,0.08) 1px,
  transparent 1px);
  background-size:18px 18px;
}

.scan-line{
  position:absolute;
  left:0;
  width:100%;
  height:3px;
  background:
  linear-gradient(to right,
  transparent,
  #c8b6a6,
  transparent);

  box-shadow:
  0 0 20px rgba(200,182,166,0.8);

  animation:
  scanMove 2s linear infinite;
}

@keyframes scanMove{
  0%{
    top:15%;
  }

  100%{
    top:85%;
  }
}

.scanner-box h2{
  letter-spacing:3px;
  font-size:20px;
  margin-top:10px;
}

.progress-bar{
  width:100%;
  height:10px;
  background:rgba(255,255,255,0.12);
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

#progressFill{
  width:0%;
  height:100%;
  background:#c8b6a6;
  transition:0.2s;
}

#percentText{
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
}

</style>
</head>

<body>

<header>namonaki Hair Atelier</header>

<div class="container">

  <!-- INPUT -->
  <div class="card" id="inputBox">
    <p>AIカウンセリング</p>

    <input type="file" id="fileInput" accept="image/*"><br>

    <button
  id="menBtn"
  onclick="setGender('men')"
  class="gray">

  メンズ
</button>

<button
  id="womenBtn"
  onclick="setGender('women')"
  class="gray">

  レディース
</button>

    <br>

    <button class="primary" onclick="startAI()">AIで似合う髪型を見る</button>
  </div>

  <!-- LOADING -->
  <div id="loadingScreen" class="loading-screen">

  <div class="scanner-box">

    <div class="scan-line"></div>

    <div class="ai-face">
      <div class="face-grid"></div>
    </div>

    <h2>AI ANALYZING</h2>

    <p id="loadingText">
      Face Balance Scan...
    </p>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>

    <div id="percentText">
      0%
    </div>

  </div>

</div>

  <!-- RESULT -->
<div id="result" class="result-box">
  <h2 id="resultTop">AI診断結果</h2>

  <p id="faceType" class="hidden"></p>

<p id="vibe" class="hidden"></p>

<p id="hairType" class="hidden"></p>

<p id="counselingText" class="hidden"></p>

<p id="hairPreviewTitle"></p>
  <img id="preview">
<div id="styleSuggestions"></div>

  <br><br>

  <button class="primary" onclick="generateHair()">
    似合う髪型を合成
  </button>

  <br><br>

  <button class="primary" onclick="saveLINE()">
    LINEで保存
  </button>

  <button class="primary" onclick="saveStory()">
    ストーリー保存
  </button>

  <button class="gray" onclick="location.reload()">
    戻る
  </button>
</div>

</div>

<script>

let gender = "men";
let selectedImage = "";

function setGender(g) {

  gender = g;

  document.getElementById(
    "menBtn"
  ).classList.remove(
    "selected"
  );

  document.getElementById(
    "womenBtn"
  ).classList.remove(
    "selected"
  );

  if (g === "men") {

    document.getElementById(
      "menBtn"
    ).classList.add(
      "selected"
    );

  } else {

    document.getElementById(
      "womenBtn"
    ).classList.add(
      "selected"
    );
  }
}

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    selectedImage = event.target.result;
  }

  reader.readAsDataURL(file);
});

function startAI() {

  if (!selectedImage) {
    alert("顔写真を選択してください");
    return;
  }

  document.getElementById("inputBox").style.display =
    "none";

  document.getElementById("loader").style.display =
    "block";

  document.getElementById("loadingText").innerText =
    "AIが顔バランスを分析中...";

  setTimeout(() => {

    document.getElementById("loader").style.display =
      "none";

    document.getElementById("loadingText").innerText =
      "";

    showResult();

  }, 2500);
}

function showResult() {

document.getElementById(
  "result"
).classList.remove(
  "fade-in"
);
  document.getElementById("result").style.display = "block";

document.getElementById(
  "result"
).classList.add(
  "fade-in"
);

  let hairType = "";
  let faceType = "";
  let vibe = "";
let counselingText = "";

  if (gender === "men") {

    faceType = "顔型：面長寄り";
    vibe = "雰囲気：ナチュラル × 清潔感";

    hairType =
    "おすすめ：ナチュラルショート / センターパート / ゆるパーマ";
counselingText =
"顔まわりのバランスを見ると、横に少し厚みを出すスタイルが似合いやすいです。トップを上げすぎない方が自然にまとまりやすく、清潔感のある印象になります。";

  } else {

    faceType = "顔型：卵型寄り";
    vibe = "雰囲気：柔らかい印象";

    hairType =
    "おすすめ：レイヤースタイル / シースルーバング";
counselingText =
"顔まわりに柔らかさを出すレイヤー系が相性◎。前髪に軽さを出すことで小顔バランスが作りやすくなります。";
  }

  document.getElementById("faceType").innerText =
    faceType;

  document.getElementById("vibe").innerText =
    vibe;

  document.getElementById("hairType").innerText =
    hairType;

document.getElementById("counselingText").innerText =
  counselingText;

const items = [
  "faceType",
  "vibe",
  "hairType",
  "counselingText"
];

items.forEach((id) => {
  document.getElementById(id)
    .classList.remove("show");
});

setTimeout(() => {
  document.getElementById(
    "faceType"
  ).classList.add("show");
}, 200);

setTimeout(() => {
  document.getElementById(
    "vibe"
  ).classList.add("show");
}, 500);

setTimeout(() => {
  document.getElementById(
    "hairType"
  ).classList.add("show");
}, 800);

setTimeout(() => {
  document.getElementById(
    "counselingText"
  ).classList.add("show");
}, 1100);

  if (selectedImage) {
    document.getElementById("preview").src =
      selectedImage;
  }

if (gender === "men") {

 document.getElementById(
  "styleSuggestions"
).innerHTML = `
  <div class="style-card"
  onclick="changeStyle('ナチュラルマッシュ', event)">
  ✂ ナチュラルマッシュ
</div>

<div class="style-card"
  onclick="changeStyle('センターパート', event)">
  ✂ センターパート
</div>

<div class="style-card"
  onclick="changeStyle('ゆるパーマ', event)">
  ✂ ゆるパーマ
</div>
  </div>
`;

} else {

  document.getElementById(
  "styleSuggestions"
).innerHTML = `
  <div class="style-card"
  onclick="changeStyle('韓国風レイヤー', event)">
  ✂ 韓国風レイヤー
</div>

<div class="style-card"
  onclick="changeStyle('シースルーボブ', event)">
  ✂ シースルーボブ
</div>

<div class="style-card"
  onclick="changeStyle('柔らかミディ', event)">
  ✂ 柔らかミディ
</div>
`;
}

}

/* ===== 保存機能 ===== */

// LINE保存（簡易：画像＋テキストをまとめてダウンロード）
function saveLINE() {
  const text = document.getElementById("hairType").innerText;
  downloadText("LINE_share.txt", "【namonaki診断】\n" + text);
}

// ストーリー保存（縦長用テキスト）
function saveStory() {
  const text = document.getElementById("hairType").innerText;
  downloadText("story_share.txt",
`🌿 namonaki Hair Atelier
AI診断結果

${text}

#hair #style #namonaki`);
}

// ダウンロード処理
function downloadText(filename, text) {
  const blob = new Blob([text], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

function generateHair() {

  document.getElementById("loader").style.display =
    "block";

  document.getElementById("loadingText").innerText =
    "似合う髪型を合成中...";

  setTimeout(() => {

    document.getElementById("loader").style.display =
      "none";

    document.getElementById("loadingText").innerText =
      "";

    document.getElementById(
      "hairPreviewTitle"
    ).innerText =
      "✨ AIおすすめスタイルを適用";

    if (gender === "men") {

      document.getElementById(
        "hairType"
      ).innerText =
      "おすすめ：ナチュラルマッシュ";

    } else {

      document.getElementById(
        "hairType"
      ).innerText =
      "おすすめ：韓国風レイヤー";
    }

document.getElementById(
  "preview"
).scrollIntoView({
  behavior: "smooth"
});

  }, 2000);
}

window.changeStyle =  function(styleName, event){

document.querySelectorAll(".style-card")
.forEach(card => {
  card.classList.remove("selected-style");
});

event.currentTarget.classList.add(
  "selected-style"
);

  alert(styleName + " を選択");

  document.getElementById("hairPreviewTitle").innerText =
    "✨ AIおすすめスタイルを適用";

  document.getElementById("hairType").innerText =
    "おすすめ：" + styleName;

  setTimeout(() => {
    const el =
      document.getElementById("resultTop");

    const y =
      el.getBoundingClientRect().top +
      window.pageYOffset - 80;

    window.scrollTo({
      top: y,
      behavior: "smooth"
    });

  }, 100);

};
</script>

</body>
</html>
