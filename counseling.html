<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>
  <input type="file" accept="image/*" onchange="previewImage(event)">

<img id="preview" style="max-width:200px; display:none; margin-top:10px;">

  <br><br>

  <button onclick="analyze()">診断する</button>

  <div id="result" style="margin-top:20px;"></div>

  <br>
  <button onclick="history.back()">戻る</button>

  <script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function analyze() {
  const result = document.getElementById("result");

  result.innerText = "分析中...";

  setTimeout(() => {
    const styles = [
      "ナチュラルマッシュがおすすめです",
      "センターパートが似合います",
      "ツーブロックで清潔感アップ",
      "ゆるめパーマが相性良いです"
    ];

    const random = styles[Math.floor(Math.random() * styles.length)];

    result.innerText = "診断結果: " + random;
  }, 1500);
}
</script>

</body>
</html>
