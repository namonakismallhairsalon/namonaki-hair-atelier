<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>
  <input type="file" accept="image/*" onchange="previewImage(event)">

<img id="preview" style="max-width:200px; display:none; margin-top:10px;">

  <br><br>

  <button onclick="analyze()">診断する</button>

  <div id="result" style="margin-top:20px;"></div>

  <br>
  <button onclick="history.back()">戻る</button>

  <script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function analyze() {
  const result = document.getElementById("result");

  result.innerHTML = "分析中...";

  setTimeout(() => {
    const styles = [
      { name: "ナチュラルマッシュ", desc: "柔らかく万人受けする王道スタイル" },
      { name: "センターパート", desc: "大人っぽく清潔感が出る人気ヘア" },
      { name: "ツーブロック", desc: "爽やかで男らしい印象を強調" },
      { name: "ゆるパーマ", desc: "抜け感とおしゃれ感を両立" }
    ];

    // シャッフルして3つ選ぶ
    const shuffled = styles.sort(() => 0.5 - Math.random());
    const picks = shuffled.slice(0, 3);

    result.innerHTML = `
      <h3>あなたにおすすめの髪型</h3>

      ${picks.map(style => `
        <div style="
          border:1px solid #ddd;
          padding:15px;
          border-radius:12px;
          margin-top:10px;
        ">
          <h4>${style.name}</h4>
          <p>${style.desc}</p>
        </div>
      `).join("")}
    `;
  }, 1500);
}
</script>

</body>
</html>
