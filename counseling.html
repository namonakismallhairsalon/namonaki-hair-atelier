<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIカウンセリング</title>

<style>
.loader {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 15px;
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }

  100% {
    transform: rotate(360deg);
  }
}
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  background: white;
  max-width: 450px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

#preview {
  width: 100%;
  border-radius: 12px;
  margin-top: 15px;
  display: none;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
  font-size: 16px;
}

.diagnose-btn {
  background: black;
  color: white;
}

.back-btn {
  background: #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>カウンセリング画面</h1>

<p>あなたに似合う髪型を診断します</p>

<h3>顔写真をアップロード</h3>

<input
  type="file"
  accept="image/*"
  onchange="previewImage(event)"
>

<img id="preview">

<button
  class="diagnose-btn"
  onclick="analyze()"
>
診断する
</button>

<div id="result"></div>

<button
  class="back-btn"
  onclick="history.back()"
>
戻る
</button>

</div>

<script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview = document.getElementById("preview");

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

function analyze() {
  const result =
    document.getElementById("result");

  result.innerHTML = `
  <div style="text-align:center; padding:20px;">
    <div class="loader"></div>
    <p>AIがあなたの顔を分析中...</p>
  </div>
`;

  setTimeout(() => {

    const faceTypes = [
      "丸顔タイプ",
      "面長タイプ",
      "ベース顔タイプ",
      "卵型タイプ"
    ];

    const styles = [
      "ナチュラルマッシュ",
      "センターパート",
      "ツーブロック",
      "ゆるパーマ"
    ];

    const face =
      faceTypes[
        Math.floor(
          Math.random()
          * faceTypes.length
        )
      ];

    const picks =
      styles
      .sort(() => 0.5 - Math.random())
      .slice(0, 3);

    result.innerHTML = `
      <h3>AI診断結果</h3>

      <p><b>顔タイプ:</b> ${face}</p>

      <p><b>おすすめ:</b></p>

      <ul>
        ${picks.map(style =>
          `<li>${style}</li>`
        ).join("")}
      </ul>
    `;

  }, 1500);
}
</script>

</body>
</html>
