 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>namonaki AI Counseling</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: linear-gradient(135deg,#f4f1eb,#e9e3d9);
  font-family: "Helvetica Neue", sans-serif;
  padding: 20px;
}

.container {
  max-width: 450px;
  margin: auto;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-radius: 34px;
  padding: 30px;
}

.logo {
  text-align: center;
  font-size: 12px;
  letter-spacing: 5px;
  color: #8a7f74;
}

h1 {
  text-align: center;
  font-size: 24px;
  font-weight: 300;
}

.sub {
  text-align: center;
  color: #8c8379;
}

.upload-box {
  border: 1px solid #d8d2ca;
  border-radius: 28px;
  padding: 28px;
  text-align: center;
  background: linear-gradient(to bottom,#faf8f5,#f1ece5);
}

.file-btn {
  background: #222;
  color: white;
  padding: 12px 20px;
  border-radius: 14px;
  display: inline-block;
  cursor: pointer;
}

#preview {
  width: 100%;
  border-radius: 20px;
  margin-top: 20px;
  display: none;
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}

.diagnose-btn {
  margin-top: 20px;
  background: #222;
  color: white;
  font-weight: bold;
}

.back-btn {
  margin-top: 15px;
  background: #e6e6e6;
}

.loader {
  width: 60px;
  height: 60px;
  border: 5px solid #ddd;
  border-top: 5px solid black;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result-card {
  margin-top: 24px;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.95),
      rgba(247,244,239,0.96)
    );
  border-radius: 34px;
  padding: 28px;
  box-shadow:
    0 12px 40px rgba(0,0,0,0.08);
  border:
    1px solid rgba(255,255,255,0.6);
}

.style-grid {
  display: grid;
  gap: 14px;
}

.style-card img {
  width: 100%;
  max-height: 280px;
  object-fit: cover;
  border-radius: 18px;
}

.score-box {
  text-align: center;
  margin: 25px 0;
}

.score-title {
  font-size: 12px;
  letter-spacing: 4px;
  color: #888;
}

.score-number {
  font-size: 64px;
  font-weight: bold;
  line-height: 1;
  margin-top: 8px;
}

.score-match {
  color: #777;
  font-size: 13px;
  letter-spacing: 3px;
  margin-top: 6px;
}

.style-grid {
  display: grid;
  gap: 14px;
}

.story-card {
  width: 100%;
  max-width: 450px;
  aspect-ratio: 9 / 16;
  background: linear-gradient(135deg,#fff,#f7f4ef);
  border-radius: 30px;
  padding: 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.save-btn {
  background:
    linear-gradient(
      135deg,
      #1f1f1f,
      #444
    );
  color: white;
  border-radius: 18px;
  padding: 16px;
  margin-top: 14px;
  font-size: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">NAMONAKI HAIR ATELIER</div>
<h1>AIカウンセリング</h1>
<p class="sub">あなたに似合う髪型を診断します</p>

<div class="upload-box">
  <label class="file-btn">
    ファイル選択
    <input type="file" accept="image/*" onchange="previewImage(event)" hidden>
  </label>
</div>

<img id="preview">

<button class="diagnose-btn" onclick="analyze()">
AIで似合う髪型を見る
</button>

<div id="result"></div>

<button class="back-btn" onclick="history.back()">戻る</button>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function previewImage(event) {
  const file = event.target.files[0];
  const preview =
    document.getElementById("preview");

  if (file) {
    preview.src =
      URL.createObjectURL(file);
    preview.style.display =
      "block";
  }
}

/* =========================
   AI診断
========================= */
function analyze() {
  const result =
    document.getElementById("result");

  result.innerHTML = `
    <div class="score-box">

  <div class="score-title">
    NAMONAKI AI SCORE
  </div>

  <div class="score-number">
    ${score}%
  </div>

  <div class="score-match">
    MATCH
  </div>

</div>

  setTimeout(() => {

    const score =
      Math.floor(Math.random()*10)+90;

    result.innerHTML = `
      <div class="result-card">

        <h2>✨ AI診断結果</h2>

        <div style="text-align:center;">
          <div>AI SCORE</div>

          <div style="
            font-size:40px;
            font-weight:bold;
          ">
            ${score}%
          </div>
        </div>

        <p>おすすめスタイル</p>

        <div class="style-grid">
          <div class="style-card">
            <img
              src="https://images.unsplash.com/photo-1517832606299-7ae9b720a186?w=500"
              crossOrigin="anonymous"
            >
            <p>ナチュラルマッシュ</p>
          </div>
        </div>

        <div style="
          background:black;
          color:white;
          padding:18px;
          border-radius:18px;
          margin-top:20px;
        ">
          NAMONAKI美容師コメント
          <br><br>
          あなたにとても似合うバランスです。
        </div>

        <button
          class="save-btn"
          onclick="saveResult()"
        >
          診断結果を保存
        </button>

        <button
          class="save-btn"
          onclick="shareLine()"
        >
          LINEで共有
        </button>

        <button
          class="save-btn"
          onclick="saveStory()"
        >
          ストーリー用で保存
        </button>

      </div>
    `;

  }, 1500);
}

/* =========================
   診断結果保存
========================= */
function saveResult() {

  const target =
    document.querySelector(
      ".result-card"
    );

  if (!target) return;

  html2canvas(target, {
    useCORS: true,
    scale: 2
  }).then(canvas => {

    canvas.toBlob(blob => {

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;
      a.download =
        "namonaki-result.png";

      a.click();

      URL.revokeObjectURL(url);

    });

  });
}

/* =========================
   LINE共有
========================= */
function shareLine() {

  const text =
    "✨ namonaki AI診断で似合う髪型が出たよ！";

  const url =
    encodeURIComponent(
      location.href
    );

  const shareUrl =
`https://social-plugins.line.me/lineit/share?url=${url}&text=${encodeURIComponent(text)}`;

  window.open(
    shareUrl,
    "_blank"
  );
}

/* =========================
   ストーリー用保存
========================= */
function saveStory() {

  const target =
    document.querySelector(
      ".result-card"
    );

  if (!target) return;

  html2canvas(target, {
    useCORS: true,
    scale: 2
  }).then(canvas => {

    const storyCanvas =
      document.createElement(
        "canvas"
      );

    storyCanvas.width = 1080;
    storyCanvas.height = 1920;

    const ctx =
      storyCanvas.getContext("2d");

    // 背景
    ctx.fillStyle = "#f4f1eb";
    ctx.fillRect(
      0,
      0,
      1080,
      1920
    );

    // カード中央配置
    const width = 900;

    const height =
      canvas.height *
      (width / canvas.width);

    ctx.drawImage(
      canvas,
      90,
      250,
      width,
      height
    );

    // ロゴ
    ctx.fillStyle = "#222";
    ctx.font =
      "bold 42px sans-serif";

    ctx.textAlign =
      "center";

    ctx.fillText(
      "NAMONAKI HAIR ATELIER",
      540,
      140
    );

    storyCanvas.toBlob(blob => {

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;
      a.download =
        "namonaki-story.png";

      a.click();

      URL.revokeObjectURL(url);

    }, "image/png");

  });
}
</script>
