<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>namonaki AI Counseling</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:linear-gradient(135deg,#f4f1eb,#e9e3d9);
  font-family:"Helvetica Neue",sans-serif;
  padding:20px;
}

.container{
  max-width:450px;
  margin:auto;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(14px);
  border-radius:34px;
  padding:30px;
}

.logo{
  text-align:center;
  font-size:12px;
  letter-spacing:5px;
  color:#8a7f74;
}

h1{
  text-align:center;
  font-size:24px;
  font-weight:300;
}

.sub{
  text-align:center;
  color:#8c8379;
}

.upload-box{
  border:1px solid #d8d2ca;
  border-radius:28px;
  padding:28px;
  text-align:center;
  background:linear-gradient(to bottom,#faf8f5,#f1ece5);
}

.file-btn{
  background:#222;
  color:white;
  padding:12px 20px;
  border-radius:14px;
  display:inline-block;
  cursor:pointer;
}

#preview{
  width:100%;
  border-radius:20px;
  margin-top:20px;
  display:none;
}

.gender-wrap{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.gender-btn{
  flex:1;
  border:none;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  cursor:pointer;
}

.active{
  background:#222;
  color:white;
}

.inactive{
  background:#ddd;
  color:black;
}

button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  font-size:16px;
  cursor:pointer;
}

.diagnose-btn{
  margin-top:20px;
  background:#222;
  color:white;
  font-weight:bold;
}

.back-btn{
  margin-top:15px;
  background:#e6e6e6;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #ddd;
  border-top:5px solid black;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

.result-card{
  margin-top:24px;
  background:linear-gradient(
    180deg,
    rgba(255,255,255,0.95),
    rgba(247,244,239,0.96)
  );
  border-radius:34px;
  padding:28px;
  box-shadow:0 12px 40px rgba(0,0,0,0.08);
}

.score-box{
  text-align:center;
  margin:25px 0;
}

.score-title{
  font-size:12px;
  letter-spacing:4px;
  color:#888;
}

.score-number{
  font-size:64px;
  font-weight:bold;
}

.score-match{
  color:#777;
  font-size:13px;
  letter-spacing:3px;
}

.style-card img{
  width:100%;
  border-radius:18px;
  max-height:280px;
  object-fit:cover;
}

.save-btn{
  background:linear-gradient(
    135deg,
    #1f1f1f,
    #444
  );
  color:white;
  border-radius:18px;
  padding:16px;
  margin-top:14px;
  font-size:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
NAMONAKI HAIR ATELIER
</div>

<h1>AIカウンセリング</h1>

<p class="sub">
あなたに似合う髪型を診断します
</p>

<div class="upload-box">
  <label class="file-btn">
    ファイル選択
    <input
      type="file"
      accept="image/*"
      hidden
      onchange="previewImage(event)"
    >
  </label>
</div>

<img id="preview">

<div class="gender-wrap">

  <button
    id="mensBtn"
    class="gender-btn active"
    onclick="setGender('mens')"
  >
    メンズ
  </button>

  <button
    id="ladiesBtn"
    class="gender-btn inactive"
    onclick="setGender('ladies')"
  >
    レディース
  </button>

</div>

<button
  class="diagnose-btn"
  onclick="analyze()"
>
AIで似合う髪型を見る
</button>

<div id="result"></div>

<button
  class="back-btn"
  onclick="history.back()"
>
戻る
</button>

</div>

<script>
let gender = "mens";

/* 性別切替 */
function setGender(type){

  gender = type;

  const mens =
    document.getElementById(
      "mensBtn"
    );

  const ladies =
    document.getElementById(
      "ladiesBtn"
    );

  if(type === "mens"){

    mens.className =
      "gender-btn active";

    ladies.className =
      "gender-btn inactive";

  }else{

    ladies.className =
      "gender-btn active";

    mens.className =
      "gender-btn inactive";
  }
}

/* 写真プレビュー */
function previewImage(event){

  const file =
    event.target.files[0];

  const preview =
    document.getElementById(
      "preview"
    );

  if(file){

    preview.src =
      URL.createObjectURL(file);

    preview.style.display =
      "block";
  }
}

function analyze(){

    document.getElementById(
      "result"
