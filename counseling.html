<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カウンセリング</title>
</head>

<body>

  <h1>カウンセリング画面</h1>
  <p>あなたに似合う髪型を診断します</p>

  <h2>顔写真をアップロード</h2>

  <input type="file" accept="image/*">
  <br><br>

  <button onclick="analyze()">診断する</button>

  <p id="result"></p>

  <button onclick="history.back()">戻る</button>

  <script>
    function analyze() {
      document.getElementById("result").innerText =
        "分析中... あなたに似合うスタイルを計算しています";
    }
  </script>

</body>
</html>
